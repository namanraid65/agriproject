services:
  - type: web
    name: agriproject-backend
    env: node
    region: singapore
    plan: free
    rootDir: apps/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BACKEND_URL
        sync: false   # Set manually to your Render backend URL (e.g. https://agriproject-1j5a.onrender.com)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false   # Set manually for persistent Cloudinary image storage
      - key: CLOUDINARY_API_KEY
        sync: false   # Set manually
      - key: CLOUDINARY_API_SECRET
        sync: false   # Set manually
